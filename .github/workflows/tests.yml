name: Tests

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  smoke-tests:
    runs-on: windows-latest
    env:
      AHK_VERSION: "2.0.26"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate AHK v2 migration guardrails
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          $ahkFiles = Get-ChildItem -Recurse -File -Filter *.ahk |
            Where-Object { $_.FullName -notmatch '\\.release-tools\\|\\.tmp-|\\UIA-v2-1\.1\.1\\|\\AutoHotkey\\' }

          $classMethodFunc = $ahkFiles | Select-String -Pattern 'Func\("[A-Za-z0-9_]+\.[A-Za-z0-9_]+'
          if ($classMethodFunc) {
            Write-Host 'Invalid callback pattern found (Func("Class.Method")):' -ForegroundColor Red
            $classMethodFunc | ForEach-Object { Write-Host ("{0}:{1}:{2}" -f $_.Path, $_.LineNumber, $_.Line.Trim()) }
            throw 'AHK v2 callback guard failed.'
          }

          $legacyApis = $ahkFiles | Select-String -Pattern '\b(ComObjCreate|ComObjGet|ObjInsert|ObjRemove|ObjRawSet|ObjRawGet|StringTrimLeft|StringTrimRight|StringGetPos|StringLeft|StringRight|StringMid)\b'
          if ($legacyApis) {
            Write-Host 'Potential AHK v1 APIs found:' -ForegroundColor Red
            $legacyApis | ForEach-Object { Write-Host ("{0}:{1}:{2}" -f $_.Path, $_.LineNumber, $_.Line.Trim()) }
            throw 'AHK v1 API guard failed.'
          }

          Write-Host 'AHK v2 migration guardrails passed.' -ForegroundColor Green

      - name: Install AutoHotkey
        id: install-ahk
        shell: powershell
        run: |
          $headers = @{ 'User-Agent' = 'Lab-Station-CI' }
          $ahkUrl = "https://github.com/AutoHotkey/AutoHotkey/releases/download/v$Env:AHK_VERSION/AutoHotkey_$($Env:AHK_VERSION).zip"
          Write-Host "Downloading AutoHotkey v$Env:AHK_VERSION from $ahkUrl"
          Invoke-WebRequest -Uri $ahkUrl -OutFile 'AutoHotkey.zip' -Headers $headers
          Expand-Archive -Path 'AutoHotkey.zip' -DestinationPath 'AutoHotkey' -Force
          $ahkExe = (Resolve-Path 'AutoHotkey/AutoHotkey64.exe').Path
          "AHK_EXE=$ahkExe" | Out-File -FilePath $Env:GITHUB_ENV -Append

      - name: Run LabStation wizard callback tests
        shell: powershell
        run: |
          & $Env:AHK_EXE labstation\tests\WizardActionCallbacksTests.ahk

      - name: Run DualAppMode smoke test
        shell: powershell
        run: |
          & $Env:AHK_EXE tests\SmokeTest_DualAppMode.ahk

      - name: Run argument parsing matrix
        shell: powershell
        run: |
          & $Env:AHK_EXE tests\ArgumentParsingTests.ahk

      - name: Upload smoke test log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-logs
          path: controller/tests/AppControl.log
          if-no-files-found: ignore
